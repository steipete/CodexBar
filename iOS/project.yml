name: CodexBariOS
options:
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: S6X968FP2X
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CODEXBAR_IOS_BUNDLE_PREFIX: com.snode.codexbar.ios
    CODEXBAR_IOS_APP_GROUP: group.com.snode.codexbar.ios
targets:
  CodexBariOSShared:
    type: framework
    platform: iOS
    sources:
      - path: CodexBariOSShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CODEXBAR_IOS_BUNDLE_PREFIX).shared
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
  CodexBariOS:
    type: application
    platform: iOS
    sources:
      - path: CodexBariOS
    dependencies:
      - target: CodexBariOSShared
      - target: CodexBariOSWidget
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CODEXBAR_IOS_BUNDLE_PREFIX)
        INFOPLIST_FILE: CodexBariOS/CodexBariOS-Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexBariOS/CodexBariOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
  CodexBariOSWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: CodexBariOSWidget
    dependencies:
      - target: CodexBariOSShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CODEXBAR_IOS_BUNDLE_PREFIX).widget
        INFOPLIST_FILE: CodexBariOSWidget/CodexBariOSWidget-Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexBariOSWidget/CodexBariOSWidget.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
  CodexBariOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CodexBariOSTests
    dependencies:
      - target: CodexBariOSShared
    hostApplication: CodexBariOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CODEXBAR_IOS_BUNDLE_PREFIX).tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
schemes:
  CodexBariOS:
    build:
      targets:
        CodexBariOS: all
        CodexBariOSWidget: all
        CodexBariOSTests: [test]
    test:
      targets:
        - CodexBariOSTests
